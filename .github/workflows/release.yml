name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "apps/docs/**"
      - "**/*.md"
      - ".github/**"
      - ".gitignore"
      - "vercel.json"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish @roy-ui/ui
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @roy-ui/ui typecheck

      - name: Build
        run: pnpm --filter @roy-ui/ui build

      - name: Unit tests
        run: pnpm --filter @roy-ui/ui test

      - name: Bundle budgets
        run: pnpm --filter @roy-ui/ui check-size

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: bump
        working-directory: packages/ui
        run: |
          VERSION=$(node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const [major, minor, patch] = pkg.version.split('.').map(Number);
            pkg.version = \`\${major}.\${minor}.\${patch + 1}\`;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log(pkg.version);
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        working-directory: packages/ui
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump and tag
        run: |
          git add packages/ui/package.json
          git commit -m "chore(release): @roy-ui/ui@${{ steps.bump.outputs.version }} [skip ci]"
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin HEAD:main
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
